arch: arm64
suite: bookworm
mirror: http://deb.debian.org/debian
components: [main, contrib, non-free, non-free-firmware]

hostname: flashpi
timezone: Europe/Berlin
locale: en_US.UTF-8

user:
  name: pi
  password: disabled
ssh_authorized_keys:
  - "ssh-rsa noo that wasn't my pub ssh key"

packages:
  # --- core CLI ---
  - git
  - less
  - sudo

  # net
  - net-tools
  - openssh-server
  - torsocks
  - curl
  - wget

  # ui/ux
  - neovim
  - fzf
  - tmux
  - screen
  - vim
  - htop
  - bash-completion
  - openssh-client

  # file mgm
  # - scp in openssh client
  - rsync
  - sshfs

  # --- archivers & compressors ---
  - 7zip # provides '7zz' on Bookworm; prefer this over p7zip-full
  - zip
  - unzip
  - xz-utils
  - zstd

  # --- services/daemons ---
  - cron

  # --- hardware tools ---
  - usbutils # 'lsusb'
  # - pciutils   # 'lspci' (optional, Pi rarely needs it)
  # - i2c-tools  # if you use I2C

wifi:
  country: DE
  ssid: "MySSID"
  psk: "supersecret"

firstboot_expand_root: true

image:
  size_gb: 4
